name: SEO Health Check

on:
  workflow_dispatch:
  schedule:
    - cron: "20 13 * * 1"

jobs:
  seo-health-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run SEO health check
        run: npm run seo:check
